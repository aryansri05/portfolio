  <text x="340" y="158" fill="#6B7482" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">kernel launch</text>
  <text x="558" y="142" fill="#121417" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">OUTPUT</text>
  <text x="564" y="166" fill="#6B7482" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">tokens/sec</text>

