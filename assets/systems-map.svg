  <text x="304" y="324" fill="#6B7482" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">row kernels</text>
  <text x="456" y="324" fill="#6B7482" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">latency trace</text>
